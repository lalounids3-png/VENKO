<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VENKO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/estilos_bootstrap.css">
</head>
  <body>
    
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
            <img src="/static/logo.jpeg" alt="Logo"  width="80" height="80">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">
                            <h2>Bienvenido {{ nombre }}</h2>
                            <h2>{{ rol }}</h2></a>
                    </li>
                </ul>
                <div id="liveAlertPlaceholder">
                    <button type="button" class="btn btn-primary" id="btnProductos" width="15">Productos</button>
                    <button type="button" class="btn btn-primary" id="btnUsuarios" width="15">Usuarios</button>
                    <button type="button" class="btn btn-primary" id="btnVentas" width="15">Ventas Totales</button>
                   <br>
                </div>
                <form class="d-flex" role="search" id="formBuscar">
                    <input class="form-control me-2" type="search" placeholder="Buscar Productos" aria-label="Buscar" id="buscarProducto"/>
                    <button class="btn btn-outline-success" type="submit">Buscar</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3 id="tituloPanel">Panel administrador</h3>
        <div id="panelAdmin">
            <p>Elige una opción de arriba.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/static/acciones.js"></script>
</body>
</html>
